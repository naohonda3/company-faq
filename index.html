<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社内FAQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --surface2: #F0EEE9;
    --border: #E2DED7;
    --text-primary: #1A1917;
    --text-secondary: #6B6760;
    --text-muted: #9B9890;
    --accent: #2563EB;
    --accent-light: #EFF4FF;
    --accent-hover: #1D4ED8;
    --tag-bg: #EDEAE4;
    --tag-text: #4A4844;
    --open-bg: #F0FDF4;
    --open-border: #86EFAC;
    --open-text: #166534;
    --radius: 10px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.07);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --transition: 0.18s ease;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.7;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    max-width: 860px; margin: 0 auto;
    height: 60px; display: flex;
    align-items: center; justify-content: space-between;
  }
  .logo {
    font-size: 16px; font-weight: 700;
    letter-spacing: -0.02em;
    display: flex; align-items: center; gap: 8px;
  }
  .logo-icon {
    width: 28px; height: 28px; background: var(--accent);
    border-radius: 7px; display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 16px; height: 16px; }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .btn-ask {
    background: var(--accent); color: #fff; border: none;
    border-radius: 8px; padding: 8px 16px;
    font-size: 13.5px; font-weight: 500; font-family: inherit;
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: background var(--transition);
  }
  .btn-ask:hover { background: var(--accent-hover); }
  .btn-admin {
    background: transparent; color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 14px; font-size: 13px; font-family: inherit;
    cursor: pointer; transition: all var(--transition);
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .btn-admin:hover { border-color: var(--text-secondary); color: var(--text-primary); }

  .hero {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 36px 24px 32px;
  }
  .hero-inner { max-width: 860px; margin: 0 auto; }
  .hero h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
  .hero p { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }
  .search-wrap { position: relative; }
  .search-wrap svg {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px; color: var(--text-muted); pointer-events: none;
  }
  #search-input {
    width: 100%; padding: 13px 14px 13px 42px;
    font-size: 15px; font-family: inherit;
    border: 1.5px solid var(--border); border-radius: var(--radius);
    background: var(--bg); color: var(--text-primary); outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  #search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    background: var(--surface);
  }
  #search-input::placeholder { color: var(--text-muted); }

  .main { max-width: 860px; margin: 0 auto; padding: 28px 24px 60px; }

  .category-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .cat-btn {
    padding: 6px 14px; border-radius: 20px;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text-secondary); font-family: inherit;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all var(--transition); white-space: nowrap;
  }
  .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .result-meta { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; }
  .result-meta span { color: var(--text-secondary); font-weight: 500; }

  .faq-list { display: flex; flex-direction: column; gap: 8px; }
  .faq-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: box-shadow var(--transition), border-color var(--transition);
  }
  .faq-item:hover { box-shadow: var(--shadow-sm); border-color: #C8C4BC; }
  .faq-question {
    width: 100%; display: flex; align-items: center; gap: 14px;
    padding: 16px 18px; background: none; border: none;
    text-align: left; cursor: pointer; font-family: inherit;
    color: var(--text-primary); font-size: 14.5px; font-weight: 500;
    line-height: 1.5; transition: background var(--transition);
  }
  .faq-question:hover { background: var(--bg); }
  .faq-question.open { background: var(--accent-light); }
  .q-badge {
    flex-shrink: 0; width: 24px; height: 24px;
    background: var(--accent); color: #fff; border-radius: 6px;
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .q-text { flex: 1; }
  .faq-tags { display: flex; gap: 5px; flex-shrink: 0; }
  .tag {
    padding: 2px 8px; background: var(--tag-bg); color: var(--tag-text);
    border-radius: 4px; font-size: 11.5px; font-weight: 500;
  }
  .chevron {
    flex-shrink: 0; width: 18px; height: 18px;
    color: var(--text-muted); transition: transform var(--transition);
  }
  .faq-question.open .chevron { transform: rotate(180deg); }
  .faq-answer {
    display: none; padding: 0 18px 18px 56px;
    border-top: 1px solid var(--border);
  }
  .faq-answer.open { display: block; }
  .a-label {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 700; color: var(--open-text);
    background: var(--open-bg); border: 1px solid var(--open-border);
    border-radius: 5px; padding: 2px 8px; margin: 14px 0 10px;
  }
  .a-text { font-size: 14px; color: var(--text-primary); line-height: 1.8; }
  .a-text p + p { margin-top: 8px; }
  .a-updated { margin-top: 12px; font-size: 12px; color: var(--text-muted); }
  .a-links { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .a-link-card {
    display: flex; align-items: center; gap: 10px; max-width: 420px;
    padding: 10px 14px; background: var(--accent-light); border: 1px solid #BFDBFE; border-radius: 8px;
    text-decoration: none; color: var(--accent); font-size: 13.5px; font-weight: 500;
    transition: background var(--transition), border-color var(--transition);
  }
  .a-link-card:hover { background: #DBEAFE; border-color: #93C5FD; }
  .a-link-card svg { flex-shrink: 0; width: 15px; height: 15px; }
  .a-link-card span { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ローディング */
  .loading {
    text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* エラー */
  .error-state {
    background: #FEF2F2; border: 1px solid #FEE2E2; color: #DC2626;
    padding: 14px 18px; border-radius: 8px; font-size: 14px; margin-bottom: 20px;
    display: none; align-items: center; gap: 10px;
  }
  .error-state.show { display: flex; }

  /* 該当なし */
  .empty-state {
    text-align: center; padding: 50px 20px; color: var(--text-secondary);
    display: none; flex-direction: column; align-items: center;
  }
  .empty-state.show { display: flex; }
  .empty-icon {
    width: 48px; height: 48px; color: var(--text-muted); background: var(--surface2);
    border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 16px;
  }
  .empty-state h3 { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
  .empty-state p { font-size: 13.5px; color: var(--text-muted); margin-bottom: 20px; }
  .btn-ask-empty {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 16px; font-size: 13.5px; font-weight: 500; color: var(--text-secondary);
    cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: inherit;
    transition: all var(--transition);
  }
  .btn-ask-empty:hover { border-color: var(--text-secondary); color: var(--text-primary); background: var(--bg); }

  /* モーダル */
  .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(26,25,23,0.45); backdrop-filter: blur(2px);
    display: none; align-items: center; justify-content: center; z-index: 1000;
    padding: 20px; opacity: 0; transition: opacity var(--transition);
  }
  .modal-overlay.show { display: flex; opacity: 1; }
  .modal {
    background: var(--surface); width: 100%; max-width: 460px;
    border-radius: var(--radius); box-shadow: var(--shadow-md);
    padding: 24px; position: relative; transform: translateY(15px);
    transition: transform var(--transition);
  }
  .modal-overlay.show .modal { transform: translateY(0); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; }
  .modal-header h2 { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  .modal-close {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    padding: 4px; display: flex; align-items: center; justify-content: center;
    border-radius: 6px; transition: all var(--transition);
  }
  .modal-close:hover { background: var(--bg); color: var(--text-secondary); }
  .modal-close svg { width: 18px; height: 18px; }
  
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; }
  .form-input {
    width: 100%; padding: 10px 12px; font-family: inherit; font-size: 14px;
    border: 1.5px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text-primary); outline: none;
    transition: border-color var(--transition);
  }
  .form-textarea {
    width: 100%; padding: 10px 12px; font-family: inherit; font-size: 14px;
    border: 1.5px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text-primary); outline: none;
    transition: border-color var(--transition); resize: none;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--accent); background: var(--surface); }
  .form-textarea { min-height: 100px; line-height: 1.6; }
  
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
  .btn-cancel {
    padding: 9px 16px; background: none; border: 1px solid var(--border); border-radius: 8px;
    font-family: inherit; font-size: 13.5px; cursor: pointer; color: var(--text-secondary);
    transition: all var(--transition);
  }
  .btn-cancel:hover { border-color: var(--text-secondary); color: var(--text-primary); }
  .btn-submit {
    padding: 9px 20px; background: var(--accent); color: #fff; border: none; border-radius: 8px;
    font-family: inherit; font-size: 13.5px; font-weight: 500; cursor: pointer;
    transition: background var(--transition);
  }
  .btn-submit:hover { background: var(--accent-hover); }
  .btn-submit:disabled { background: var(--text-muted); cursor: not-allowed; }

  /* トースト */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--text-primary); color: #fff; padding: 11px 20px; border-radius: 8px;
    font-size: 13.5px; font-weight: 500; display: flex; align-items: center; gap: 8px;
    box-shadow: var(--shadow-md); opacity: 0; pointer-events: none;
    transition: transform 0.22s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s ease; z-index: 2000;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast svg { width: 16px; height: 16px; color: #4ADE80; flex-shrink: 0; }
</style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        社内FAQ
      </div>
      <div class="header-actions">
        <button class="btn-ask" onclick="openModal()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          質問を送る
        </button>
        <button class="btn-admin" onclick="openAdminTab(); return false;">管理者画面 ↗</button>
      </div>
    </div>
  </header>

  <div class="hero">
    <div class="hero-inner">
      <h1>何かお困りですか？</h1>
      <p>業務の手続きやシステムの利用方法など、キーワードで検索できます。</p>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="キーワードを入力（例：有給、経費、VPN）" oninput="handleSearch()">
      </div>
    </div>
  </div>

  <main class="main">
    <div class="error-state" id="error-state"></div>

    <div class="category-row" id="category-row"></div>

    <div class="result-meta" id="result-meta" style="display:none;">
      検索結果: <span id="match-count">0</span> 件
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>データを読み込んでいます…</div>
    </div>

    <div class="faq-list" id="faq-list"></div>

    <div class="empty-state" id="empty-state">
      <div class="empty-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <h3 id="empty-title">該当するFAQが見つかりませんでした</h3>
      <p id="empty-desc">別のキーワードで検索するか、質問を送ってください</p>
      <button class="btn-ask-empty" onclick="openModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        質問を送る
      </button>
    </div>
  </main>

  <div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal">
      <div id="modal-step1">
        <div class="modal-header">
          <h2>質問を送る前に確認してください</h2>
          <button class="modal-close" onclick="closeModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div style="padding:8px 0 20px">
          <p style="font-size:14px;color:var(--text-secondary);margin-bottom:20px">
            質問を送る前に、FAQを検索してみましたか？<br>すでに同じ質問が掲載されている可能性があります。
          </p>
          <div style="display:flex;flex-direction:column;gap:10px">
            <button class="btn-submit" style="width:100%;padding:11px" onclick="focusSearch()">もう一度検索してみる</button>
            <button class="btn-cancel" style="width:100%;padding:11px" onclick="goToStep2()">解決しないので質問を送る</button>
          </div>
        </div>
      </div>

      <div id="modal-step2" style="display:none;">
        <div class="modal-header">
          <h2>管理者へ質問を送信</h2>
          <button class="modal-close" onclick="closeModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div style="padding-top:14px;">
          <div class="form-group">
            <label for="form-question">質問内容 <span style="color:#DC2626">*</span></label>
            <textarea id="form-question" class="form-textarea" placeholder="知りたい内容を詳しく記入してください（例：〇〇の手続き方法を教えてください）"></textarea>
          </div>
          <div class="form-group">
            <label for="form-name">お名前（任意）</label>
            <input type="text" id="form-name" class="form-input" placeholder="匿名で送信する場合は空欄で可">
          </div>
          <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
            <button class="btn-submit" id="submit-btn" onclick="submitForm()">送信する</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="toast-msg">質問を送信しました。</span>
  </div>

<script>
// ===== 設定項目 =====
const BASE_URL = 'https://sheets.googleapis.com/v4/spreadsheets/1h8wN6KOf98g_Dk1I8f_tZ_029w4O2X8eF6O-A_Z9XJw'; 
const API_KEY = 'AIzaSyA4...'; // 実際のAPIキーを設定してください

let allFaqs = [];
let currentCategory = '全部';
let openId = null;

// 表記揺れマッピング辞書
const SYNONYMS = [
  { rep: '有給', words: ['有給', '有休', '休暇', '休み', 'ゆうきゅう', 'ゆうきゅうきゅうか'] },
  { rep: '経費', words: ['経費', '精算', '領収書', '交通費', 'お金', 'けいひ', 'せいさん'] },
  { rep: 'PC', words: ['パソコン', 'pc', '端末', 'mac', 'windows', 'ぱそこん'] },
  { rep: '勤怠', words: ['勤怠', '打刻', '出勤', '退勤', '遅刻', '欠勤', 'きんたい'] }
];

// ページ読み込み時に実行
document.addEventListener('DOMContentLoaded', () => {
  loadFaqs(); // 👈 正しい関数名に変更しました
});

// 類義語を含めた検索キーワードの展開
function expandKeywords(query) {
  const q = query.trim().toLowerCase();
  if (!q) return [];
  const terms = new Set([q]);
  for (const group of SYNONYMS) {
    const all = [group.rep, ...group.words].map(w => w.toLowerCase());
    if (all.includes(q)) {
      all.forEach(w => terms.add(w));
    }
  }
  return [...terms];
}

// ===== Google Sheetsからデータ取得 =====
async function loadFaqs() {
  showLoading(true);
  showError('');
  try {
    const url = `${BASE_URL}/faqs?key=${API_KEY}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const rows = data.values || [];
    
    // 1行目はヘッダーなのでスキップ、2行目以降がデータ
    allFaqs = rows.slice(1)
      .filter(r => r[4] === 'published') // statusが'published'のみ
      .map((r, i) => ({
        id: i + 1,
        category: r[1] || '',
        q: r[2] || '',
        a: r[3] || '',
        updated: r[5] || '',
        url: r[6] || '' // G列：関連URL
      }))
      .filter(f => f.q && f.a);

    renderCategories();
    renderFAQ();
  } catch (e) {
    showError('データの読み込みに失敗しました。スプレッドシートの共有設定とAPIキーをご確認ください。');
    console.error(e);
  } finally {
    showLoading(false);
  }
}

// ===== 投稿をSheetsに書き込む（GAS経由）=====
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxG_F...'; // 実際のGAS URLを設定してください

async function writeSubmission(name, question) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name || '匿名', question: question })
  });
  return res;
}

// ===== カテゴリ帯の描画 =====
function renderCategories() {
  const cats = new Set(['全部']);
  allFaqs.forEach(f => { if(f.category.trim()) cats.add(f.category.trim()); });
  
  const container = document.getElementById('category-row');
  container.innerHTML = [...cats].map(c => `
    <button class="cat-btn ${c===currentCategory?'active':''}" onclick="setCategory('${c}')">${c}</button>
  `).join('');
}

function setCategory(cat) {
  currentCategory = cat;
  renderCategories();
  renderFAQ();
}

// ===== FAQリストの描画と検索フィルタリング =====
function handleSearch() {
  renderFAQ();
}

function renderFAQ() {
  const searchInput = document.getElementById('search-input');
  const query = searchInput ? searchInput.value.trim() : '';
  const keywords = expandKeywords(query);

  const filtered = allFaqs.filter(f => {
    // カテゴリ絞り込み
    if (currentCategory !== '全部' && f.category !== currentCategory) return false;
    
    // キーワード検索絞り込み
    if (keywords.length > 0) {
      const match = keywords.some(k => 
        f.q.toLowerCase().includes(k) || 
        f.a.toLowerCase().includes(k) || 
        f.category.toLowerCase().includes(k)
      );
      if (!match) return false;
    }
    return true;
  });

  // 件数表示の制御
  const meta = document.getElementById('result-meta');
  if (query) {
    meta.style.display = 'block';
    document.getElementById('match-count').textContent = filtered.length;
  } else {
    meta.style.display = 'none';
  }

  const container = document.getElementById('faq-list');
  const empty = document.getElementById('empty-state');

  if (filtered.length === 0) {
    container.innerHTML = '';
    empty.classList.add('show');
    if (query) {
      document.getElementById('empty-title').textContent = `「${query}」に一致するFAQは見つかりませんでした`;
      document.getElementById('empty-desc').textContent = 'キーワードを変えてみるか、管理者へ直接質問を送ることができます。';
    } else {
      document.getElementById('empty-title').textContent = '該当するFAQがありません';
      document.getElementById('empty-desc').textContent = 'このカテゴリには現在掲載されているFAQがありません。';
    }
    return;
  }

  empty.classList.remove('show');
  container.innerHTML = filtered.map(f => {
    const isOpen = openId === f.id;
    const aLines = f.a.split('\n').filter(Boolean).map(l => `<p>${l}</p>`).join('');
    
    // 関連URLカード（改行区切りで複数対応）
    const urlCards = f.url ? f.url.split('\n').filter(Boolean).map(u => {
      const trimmed = u.trim();
      const parts = trimmed.split('|');
      const label = parts.length > 1 ? parts[0].trim() : trimmed;
      const href = parts.length > 1 ? parts[1].trim() : trimmed;
      return `
        <a class="a-link-card" href="${href}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          <span>${label}</span>
        </a>
      `;
    }).join('') : '';

    return `
      <div class="faq-item">
        <button class="faq-question ${isOpen?'open':''}" onclick="toggleFaq(${f.id})">
          <span class="q-badge">Q</span>
          <span class="q-text">${f.q}</span>
          <div class="faq-tags">
            <span class="tag">${f.category}</span>
          </div>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="faq-answer ${isOpen?'open':''}">
          <div class="a-label">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            回答
          </div>
          <div class="a-text">${aLines}</div>
          ${urlCards ? `<div class="a-links">${urlCards}</div>` : ''}
          ${f.updated ? `<div class="a-updated">更新日: ${f.updated}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function toggleFaq(id) {
  openId = (openId === id) ? null : id;
  renderFAQ();
}

// ===== モーダル関連制御 =====
function openModal() {
  document.getElementById('modal-step1').style.display = 'block';
  document.getElementById('modal-step2').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}
function focusSearch() {
  closeModal();
  const input = document.getElementById('search-input');
  if (input) { input.focus(); input.select(); }
}
  
function goToStep2() {
  document.getElementById('modal-step1').style.display = 'none';
  document.getElementById('modal-step2').style.display = 'block';
  const textarea = document.getElementById('form-question');
  if (textarea) textarea.focus();
}

async function submitForm() {
  const q = document.getElementById('form-question').value.trim();
  if (!q) {
    document.getElementById('form-question').style.borderColor = '#DC2626';
    setTimeout(() => document.getElementById('form-question').style.borderColor = '', 1500);
    return;
  }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '送信中…';
  const name = document.getElementById('form-name').value.trim();
  try {
    await writeSubmission(name, q);
    closeModal();
    document.getElementById('form-name').value = '';
    document.getElementById('form-question').value = '';
    showToast('質問を送信しました。管理者が確認後、FAQに追加されます。');
  } catch(e) {
    showToast('送信に失敗しました。時間をおいて再度お試しください。');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = '送信する';
  }
}

// ===== UI ユーティリティ =====
function showLoading(v) {
  document.getElementById('loading').style.display = v ? 'flex' : 'none';
}
function showError(msg) {
  const el = document.getElementById('error-state');
  if (el) {
    el.textContent = msg;
    el.classList.toggle('show', !!msg);
  }
}
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ===== 管理者タブ =====
function openAdminTab() {
  window.open('faq-admin.html', 'faq-admin-target');
}
</script>
