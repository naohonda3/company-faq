<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社内FAQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --surface2: #F0EEE9;
    --border: #E2DED7;
    --text-primary: #1A1917;
    --text-secondary: #6B6760;
    --text-muted: #9B9890;
    --accent: #2563EB;
    --accent-light: #EFF4FF;
    --accent-hover: #1D4ED8;
    --tag-bg: #EDEAE4;
    --tag-text: #4A4844;
    --open-bg: #F0FDF4;
    --open-border: #86EFAC;
    --open-text: #166534;
    --radius: 10px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.07);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --transition: 0.18s ease;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.7;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    max-width: 860px; margin: 0 auto;
    height: 60px; display: flex;
    align-items: center; justify-content: space-between;
  }
  .logo {
    font-size: 16px; font-weight: 700;
    letter-spacing: -0.02em;
    display: flex; align-items: center; gap: 8px;
  }
  .logo-icon {
    width: 28px; height: 28px; background: var(--accent);
    border-radius: 7px; display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 16px; height: 16px; }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .btn-ask {
    background: var(--accent); color: #fff; border: none;
    border-radius: 8px; padding: 8px 16px;
    font-size: 13.5px; font-weight: 500; font-family: inherit;
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: background var(--transition);
  }
  .btn-ask:hover { background: var(--accent-hover); }
  .btn-admin {
    background: transparent; color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 14px; font-size: 13px; font-family: inherit;
    cursor: pointer; transition: all var(--transition);
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .btn-admin:hover { border-color: var(--text-secondary); color: var(--text-primary); }

  .hero {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 36px 24px 32px;
  }
  .hero-inner { max-width: 860px; margin: 0 auto; }
  .hero h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
  .hero p { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }
  .search-wrap { position: relative; }
  .search-wrap svg {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px; color: var(--text-muted); pointer-events: none;
  }
  #search-input {
    width: 100%; padding: 13px 14px 13px 42px;
    font-size: 15px; font-family: inherit;
    border: 1.5px solid var(--border); border-radius: var(--radius);
    background: var(--bg); color: var(--text-primary); outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  #search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    background: var(--surface);
  }
  #search-input::placeholder { color: var(--text-muted); }

  .main { max-width: 860px; margin: 0 auto; padding: 28px 24px 60px; }

  .category-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .cat-btn {
    padding: 6px 14px; border-radius: 20px;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text-secondary); font-family: inherit;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all var(--transition); white-space: nowrap;
  }
  .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .result-meta { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; }
  .result-meta span { color: var(--text-secondary); font-weight: 500; }

  .faq-list { display: flex; flex-direction: column; gap: 8px; }
  .faq-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: box-shadow var(--transition), border-color var(--transition);
  }
  .faq-item:hover { box-shadow: var(--shadow-sm); border-color: #C8C4BC; }
  .faq-question {
    width: 100%; display: flex; align-items: center; gap: 14px;
    padding: 16px 18px; background: none; border: none;
    text-align: left; cursor: pointer; font-family: inherit;
    color: var(--text-primary); font-size: 14.5px; font-weight: 500;
    line-height: 1.5; transition: background var(--transition);
  }
  .faq-question:hover { background: var(--bg); }
  .faq-question.open { background: var(--accent-light); }
  .q-badge {
    flex-shrink: 0; width: 24px; height: 24px;
    background: var(--accent); color: #fff; border-radius: 6px;
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .q-text { flex: 1; }
  .faq-tags { display: flex; gap: 5px; flex-shrink: 0; }
  .tag {
    padding: 2px 8px; background: var(--tag-bg); color: var(--tag-text);
    border-radius: 4px; font-size: 11.5px; font-weight: 500;
  }
  .chevron {
    flex-shrink: 0; width: 18px; height: 18px;
    color: var(--text-muted); transition: transform var(--transition);
  }
  .faq-question.open .chevron { transform: rotate(180deg); }
  .faq-answer {
    display: none; padding: 0 18px 18px 56px;
    border-top: 1px solid var(--border);
  }
  .faq-answer.open { display: block; }
  .a-label {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 700; color: var(--open-text);
    background: var(--open-bg); border: 1px solid var(--open-border);
    border-radius: 5px; padding: 2px 8px; margin: 14px 0 10px;
  }
  .a-text { font-size: 14px; color: var(--text-primary); line-height: 1.8; }
  .a-text p + p { margin-top: 8px; }
  .a-updated { margin-top: 12px; font-size: 12px; color: var(--text-muted); }
  .a-links { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .a-links-label { font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
  .a-link-card {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--accent-light);
    border: 1px solid #BFDBFE;
    border-radius: 8px;
    text-decoration: none;
    color: var(--accent);
    font-size: 13.5px;
    font-weight: 500;
    transition: background var(--transition), border-color var(--transition);
  }
  .a-link-card:hover { background: #DBEAFE; border-color: #93C5FD; }
  .a-link-card svg { flex-shrink: 0; width: 15px; height: 15px; }
  .a-link-card span { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ローディング */
  .loading {
    text-align: center; padding: 60px 20px;
    color: var(--text-muted); font-size: 14px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* エラー */
  .error-state {
    background: #FEF2F2; border: 1px solid #FECACA;
    border-radius: var(--radius); padding: 16px 20px;
    font-size: 14px; color: #DC2626; display: none;
  }
  .error-state.show { display: block; }

  .empty-state { text-align: center; padding: 60px 20px; display: none; }
  .empty-state.show { display: block; }
  .empty-icon {
    width: 56px; height: 56px; background: var(--surface2); border-radius: 16px;
    display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;
  }
  .empty-icon svg { width: 28px; height: 28px; color: var(--text-muted); }
  .empty-state h3 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  .empty-state p { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }
  .btn-ask-empty {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 8px; padding: 10px 20px;
    font-size: 14px; font-weight: 500; font-family: inherit;
    cursor: pointer; transition: background var(--transition);
  }
  .btn-ask-empty:hover { background: var(--accent-hover); }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border-radius: 14px; padding: 28px;
    width: 100%; max-width: 480px; box-shadow: var(--shadow-md);
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .modal h2 { font-size: 17px; font-weight: 700; }
  .modal-close {
    background: none; border: none; cursor: pointer; color: var(--text-muted);
    padding: 4px; border-radius: 6px; display: flex; transition: color var(--transition);
  }
  .modal-close:hover { color: var(--text-primary); }
  .modal-close svg { width: 20px; height: 20px; }
  .modal-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .form-label span { color: var(--text-muted); font-weight: 400; }
  .form-input, .form-textarea {
    width: 100%; padding: 10px 12px; font-family: inherit; font-size: 14px;
    border: 1.5px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text-primary); outline: none;
    transition: border-color var(--transition); resize: none;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--accent); background: var(--surface); }
  .form-textarea { min-height: 100px; line-height: 1.6; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
  .btn-cancel {
    padding: 9px 16px; background: none; border: 1px solid var(--border);
    border-radius: 8px; font-family: inherit; font-size: 13.5px;
    cursor: pointer; color: var(--text-secondary); transition: all var(--transition);
  }
  .btn-cancel:hover { border-color: var(--text-secondary); color: var(--text-primary); }
  .btn-submit {
    padding: 9px 20px; background: var(--accent); color: #fff; border: none;
    border-radius: 8px; font-family: inherit; font-size: 13.5px;
    font-weight: 500; cursor: pointer; transition: background var(--transition);
  }
  .btn-submit:hover { background: var(--accent-hover); }
  .btn-submit:disabled { background: var(--text-muted); cursor: not-allowed; }

  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1A1917; color: #fff; padding: 12px 20px;
    border-radius: 10px; font-size: 14px; font-weight: 500;
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; z-index: 300;
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast svg { width: 18px; height: 18px; color: #4ade80; }

  @media (max-width: 600px) {
    .faq-tags { display: none; }
    .hero h1 { font-size: 19px; }
    .main { padding: 20px 16px 50px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      社内FAQ
    </div>
    <div class="header-actions">
      <button class="btn-admin" onclick="openAdminTab()">管理者</button>
      <button class="btn-ask" onclick="openModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        質問する
      </button>
    </div>
  </div>
</header>

<div class="hero">
  <div class="hero-inner">
    <h1>よくある質問</h1>
    <p>知りたいことをキーワードで検索するか、カテゴリから探してください</p>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="例：有給休暇、経費申請、テレワーク…" oninput="handleSearch(this.value)">
    </div>
  </div>
</div>

<main class="main">
  <div class="category-row" id="category-row"></div>
  <div class="result-meta" id="result-meta"></div>
  <div id="error-state" class="error-state"></div>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    データを読み込んでいます…
  </div>
  <div class="faq-list" id="faq-list"></div>
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>
    <h3 id="empty-title">該当するFAQが見つかりませんでした</h3>
    <p id="empty-desc">別のキーワードで検索するか、質問を送ってください</p>
    <button class="btn-ask-empty" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      質問を送る
    </button>
  </div>
</main>

<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <!-- ステップ1: 確認画面 -->
    <div id="modal-step1">
      <div class="modal-header">
        <h2>質問を送る前に確認してください</h2>
        <button class="modal-close" onclick="closeModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div style="padding:8px 0 20px">
        <p style="font-size:14px;color:var(--text-secondary);margin-bottom:20px">質問を送る前に、FAQを検索してみましたか？<br>すでに同じ質問が掲載されている可能性があります。</p>
        <div style="background:var(--bg);border-radius:var(--radius);padding:16px 18px;margin-bottom:20px">
          <p style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text-primary)">確認のチェックリスト</p>
          <label style="display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--text-secondary);cursor:pointer;margin-bottom:8px">
            <input type="checkbox" id="check1" style="margin-top:2px;flex-shrink:0" onchange="updateStep1Btn()">
            キーワードで検索してみた
          </label>
          <label style="display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--text-secondary);cursor:pointer">
            <input type="checkbox" id="check2" style="margin-top:2px;flex-shrink:0" onchange="updateStep1Btn()">
            カテゴリを絞り込んで探してみた
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">戻る</button>
        <button class="btn-submit" id="step1-next-btn" onclick="goToStep2()" disabled style="opacity:0.5;cursor:not-allowed">見つからなかった→質問を送る</button>
      </div>
    </div>
    <!-- ステップ2: 入力フォーム -->
    <div id="modal-step2" style="display:none">
      <div class="modal-header">
        <h2>FAQにない質問を送る</h2>
        <button class="modal-close" onclick="closeModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <p class="modal-desc">管理者が確認後、FAQに追加します。回答まで数日かかる場合があります。</p>
      <div class="form-group">
        <label class="form-label" for="form-name">お名前 <span>（任意）</span></label>
        <input class="form-input" type="text" id="form-name" placeholder="例：山田 太郎">
      </div>
      <div class="form-group">
        <label class="form-label" for="form-question">質問内容 <span>（必須）</span></label>
        <textarea class="form-textarea" id="form-question" placeholder="知りたいことを具体的に書いてください"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="backToStep1()">戻る</button>
        <button class="btn-submit" id="submit-btn" onclick="submitQuestion()">送信する</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toast-msg"></span>
</div>

<script>
// ===== 設定 =====
const API_KEY = 'AIzaSyAl6yDbHBP_-P6TXNwNW3f_rE45xjpZSrM';
const SHEET_ID = '14TvzrqwT-Q-Qk1eBG7QnPvY-t0Yu0d5SKa79F2izojE';
const BASE_URL = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values`;

// ===== 状態 =====
let allFaqs = [];
let synonymGroups = []; // [{ rep:'有給', words:['有休','年休'] }, ...]
let currentCategory = 'すべて';
let currentQuery = '';
let openId = null;

// ===== 初期化 =====
async function init() {
  await Promise.all([loadFaqs(), loadSynonyms()]);
}

// ===== 同義語シートの読み込み =====
async function loadSynonyms() {
  try {
    const url = `${BASE_URL}/synonyms?key=${API_KEY}`;
    const res = await fetch(url);
    if (!res.ok) return; // シートがなければ無視
    const data = await res.json();
    const rows = (data.values || []).slice(1);
    synonymGroups = rows
      .filter(r => r[1] && r[2])
      .map(r => ({
        rep: r[1].trim(),
        words: r[2].split('\n').map(w => w.trim()).filter(Boolean)
      }));
  } catch(e) {
    // 同義語が取れなくても検索は普通に動く
    synonymGroups = [];
  }
}

// ===== 同義語展開：入力ワードに同義語を加えたリストを返す =====
function expandQuery(query) {
  const q = query.trim().toLowerCase();
  if (!q) return [];
  const terms = new Set([q]);
  for (const group of synonymGroups) {
    const all = [group.rep, ...group.words].map(w => w.toLowerCase());
    if (all.includes(q)) {
      all.forEach(w => terms.add(w));
    }
  }
  return [...terms];
}

// ===== Google Sheetsからデータ取得 =====
async function loadFaqs() {
  showLoading(true);
  showError('');
  try {
    const url = `${BASE_URL}/faqs?key=${API_KEY}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const rows = data.values || [];

    // 1行目はヘッダーなのでスキップ、2行目以降がデータ
    // 列順: id, category, q, a, status, updated
    allFaqs = rows.slice(1)
      .filter(r => r[4] === 'published') // statusが'published'のみ
      .map((r, i) => ({
        id: i + 1,
        category: r[1] || '',
        q: r[2] || '',
        a: r[3] || '',
        updated: r[5] || '',
        url: r[6] || ''  // G列：関連URL（複数の場合は改行区切り）
      }))
      .filter(f => f.q && f.a);

    renderCategories();
    renderFAQ();
  } catch (e) {
    showError('データの読み込みに失敗しました。スプレッドシートの共有設定とAPIキーをご確認ください。');
    console.error(e);
  } finally {
    showLoading(false);
  }
}

// ===== 投稿をSheetsに書き込む（GAS経由）=====
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxG_Fcz-dYdwrsPjFhWK6gcEk9_a7V5GFSvyGQYXeI3s-P34UZOxkOspsugqOj5HEzO/exec';

async function writeSubmission(name, question) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ question, name: name || '（匿名）' })
  });
  if (!res.ok) throw new Error(`送信エラー: ${res.status}`);
  const data = await res.json();
  if (data.status !== 'ok') throw new Error(data.message || '送信に失敗しました');
  return true;
}

// ===== カテゴリ =====
function renderCategories() {
  const cats = ['すべて', ...new Set(allFaqs.map(f => f.category).filter(Boolean))];
  const row = document.getElementById('category-row');
  row.innerHTML = cats.map(cat => `
    <button class="cat-btn${cat === currentCategory ? ' active' : ''}" onclick="selectCategory('${cat}')">${cat}</button>
  `).join('');
}

function selectCategory(cat) {
  currentCategory = cat;
  openId = null;
  renderCategories();
  renderFAQ();
}

function handleSearch(val) {
  currentQuery = val.trim();
  openId = null;
  renderFAQ();
}

function getFiltered() {
  const terms = expandQuery(currentQuery); // 同義語を含む検索ワード一覧
  return allFaqs.filter(f => {
    const matchCat = currentCategory === 'すべて' || f.category === currentCategory;
    // 検索ワードがない場合は全件
    if (!terms.length) return matchCat;
    // いずれかのワードにヒットすれば表示
    const matchQ = terms.some(t =>
      f.q.toLowerCase().includes(t) ||
      f.a.toLowerCase().includes(t) ||
      f.category.toLowerCase().includes(t)
    );
    return matchCat && matchQ;
  });
}

function renderFAQ() {
  const filtered = getFiltered();
  const list = document.getElementById('faq-list');
  const empty = document.getElementById('empty-state');
  const meta = document.getElementById('result-meta');

  if (allFaqs.length === 0) return;

  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.classList.add('show');
    meta.innerHTML = '';
    if (currentQuery) {
      document.getElementById('empty-title').textContent = `「${currentQuery}」に一致するFAQはありませんでした`;
    }
  } else {
    empty.classList.remove('show');
    meta.innerHTML = `${currentCategory !== 'すべて' ? `<span>${currentCategory}</span> · ` : ''}全 <span>${filtered.length}</span> 件`;
    list.innerHTML = filtered.map(f => renderItem(f)).join('');
  }
}

function renderItem(f) {
  const isOpen = openId === f.id;
  const aLines = f.a.split('\n').filter(Boolean).map(l => `<p>${l}</p>`).join('');
  // 関連URLカード（改行区切りで複数対応）
  const urlCards = f.url
    ? f.url.split('\n').filter(Boolean).map(u => {
        const trimmed = u.trim();
        // 表示名とURLを「|」で区切る形式に対応（例：「詳細はこちら|https://...」）
        const parts = trimmed.split('|');
        const label = parts.length > 1 ? parts[0].trim() : trimmed;
        const href  = parts.length > 1 ? parts[1].trim() : trimmed;
        return `<a class="a-link-card" href="${href}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          <span>${label}</span>
        </a>`;
      }).join('')
    : '';
  return `
    <div class="faq-item" id="item-${f.id}">
      <button class="faq-question${isOpen ? ' open' : ''}" onclick="toggleItem(${f.id})">
        <span class="q-badge">Q</span>
        <span class="q-text">${f.q}</span>
        <span class="faq-tags"><span class="tag">${f.category}</span></span>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="faq-answer${isOpen ? ' open' : ''}">
        <div class="a-label">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          回答
        </div>
        <div class="a-text">${aLines}</div>
        ${urlCards ? `<div class="a-links"><div class="a-links-label">関連リンク</div>${urlCards}</div>` : ''}
        ${f.updated ? `<div class="a-updated">最終更新：${f.updated}</div>` : ''}
      </div>
    </div>
  `;
}

function toggleItem(id) {
  openId = openId === id ? null : id;
  renderFAQ();
  if (openId) {
    setTimeout(() => {
      document.getElementById(`item-${id}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }
}

// ===== モーダル =====
function openModal() {
  // チェックボックスをリセットしてステップ1から開始
  document.getElementById('check1').checked = false;
  document.getElementById('check2').checked = false;
  updateStep1Btn();
  document.getElementById('modal-step1').style.display = 'block';
  document.getElementById('modal-step2').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}
function updateStep1Btn() {
  const btn = document.getElementById('step1-next-btn');
  const checked = document.getElementById('check1').checked && document.getElementById('check2').checked;
  btn.disabled = !checked;
  btn.style.opacity = checked ? '1' : '0.5';
  btn.style.cursor = checked ? 'pointer' : 'not-allowed';
}
function goToStep2() {
  document.getElementById('modal-step1').style.display = 'none';
  document.getElementById('modal-step2').style.display = 'block';
  setTimeout(() => document.getElementById('form-question').focus(), 100);
}
function backToStep1() {
  document.getElementById('modal-step1').style.display = 'block';
  document.getElementById('modal-step2').style.display = 'none';
}

async function submitQuestion() {
  const q = document.getElementById('form-question').value.trim();
  if (!q) {
    document.getElementById('form-question').style.borderColor = '#EF4444';
    setTimeout(() => document.getElementById('form-question').style.borderColor = '', 1500);
    return;
  }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '送信中…';
  const name = document.getElementById('form-name').value.trim();
  try {
    await writeSubmission(name, q);
    closeModal();
    document.getElementById('form-name').value = '';
    document.getElementById('form-question').value = '';
    showToast('質問を送信しました。管理者が確認後、FAQに追加されます。');
  } catch(e) {
    showToast('送信に失敗しました。時間をおいて再度お試しください。');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = '送信する';
  }
}

// ===== UI ユーティリティ =====
function showLoading(v) {
  document.getElementById('loading').style.display = v ? 'flex' : 'none';
}
function showError(msg) {
  const el = document.getElementById('error-state');
  el.textContent = msg;
  el.classList.toggle('show', !!msg);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ===== 管理者タブ =====
function openAdminTab() {
  // 第2引数を一意のウィンドウ名にすることで、同一ブラウザ内で1つのタブしか開かなくなります
  const adminTab = window.open('faq-admin.html', 'faq-admin-target');
  
  // すでに開いている場合に、念のため前面に持ってくる処理（ブラウザによって挙動は異なります）
  if (adminTab) {
    adminTab.focus();
  }
}
